
worker_processes auto;
error_log /var/log/nginx/shortlink_error.log warn;
pid /var/run/shortlink.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/shortlink_access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;

    keepalive_timeout  65;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream backend {
        server localhost:8080;
    }

    server {
        listen 80;
        server_name s.example.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name s.example.com;

        ssl_certificate /etc/nginx/ssl/s.example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/s.example.com.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            set $short_code '';
            if ($request_uri ~ ^/([a-zA-Z0-9]{6,8})/?$) {
                set $short_code $1;
            }

            if ($short_code = '') {
                proxy_pass http://backend;
                break;
            }

            redis2_query get short:link:$short_code;
            redis2_pass localhost:6379;

            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://backend/api/shorten/$short_code/redirect;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
