
server:
  port: 8080

spring:
  application:
    name: short-link
  
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: admin
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath:mapper/*.xml

shortlink:
  domain: http://s.example.com
  bloom-filter:
    expected-insertions: 10000000
    false-positive-rate: 0.001

snowflake:
  worker-id: 0

logging:
  level:
    com.example.shortlink: DEBUG
    org.mybatis: DEBUG
